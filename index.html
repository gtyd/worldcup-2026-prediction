  }

const fifaRanks = {
  "阿根廷":1,"西班牙":2,"法国":3,"英格兰":4,"葡萄牙":5,"巴西":6,"摩洛哥":7,"荷兰":8,"比利时":9,"德国":10,

  "挪威":31,"科特迪瓦":33,"巴拿马":34,"瑞典":38,"捷克":40,"巴拉圭":41,"苏格兰":42,"突尼斯":45,
  "刚果民主共和国":46,"乌兹别克斯坦":50,"卡塔尔":56,"南非":60,"沙特":61,"波黑":64,"加纳":73,"库拉索":82,"海地":83,"新西兰":85
};
const formerChampions = new Set(["阿根廷", "巴西", "英格兰", "法国", "德国", "西班牙", "乌拉圭"]);

// ============ 计算概率 ============
function getFundamentalFactor(teamName) {
  let factor = 1;
  const rank = fifaRanks[teamName];
  if (rank && rank <= 10) {
    factor += 0.07;
  } else if (rank && rank <= 20) {
    factor += 0.04;
  }
  // 近期10场胜率：数据暂缺，已跳过此项修正。
  if (formerChampions.has(teamName)) {
    factor += 0.02;
  }
  return factor;
}

function getTierByProbability(probability) {
  if (probability >= 8) return 1;
  if (probability >= 4) return 2;
  if (probability >= 2) return 3;
  if (probability >= 0.8) return 4;
  return 5;
}

function calculateProbabilities(data) {
  const rawProbs = data.map(t => ({
    ...t,
    rawProb: (1 / t.odds) * getFundamentalFactor(t.name)
  }));
  const totalRaw = rawProbs.reduce((sum, t) => sum + t.rawProb, 0);
  return rawProbs.map(t => {
    const probability = (t.rawProb / totalRaw) * 100;
    const calculatedTier = getTierByProbability(probability);
    if (calculatedTier !== t.tier) {
      console.warn(`${t.name} 梯队数据与概率不一致，已按概率动态修正为第 ${calculatedTier} 梯队`);
    }
    return {
      ...t,
      tier: calculatedTier,
      probability
    };
  }).sort((a, b) => b.probability - a.probability);
}

const teams = calculateProbabilities(teamsData);

// 最大概率（用于进度条缩放）
const maxProb = teams[0].probability;

// ============ 获取梯队的CSS类名 ============
function getTierClass(tier) {
  const map = { 1:'bar-tier-1', 2:'bar-tier-2', 3:'bar-tier-3', 4:'bar-tier-4', 5:'bar-tier-5' };
  return map[tier] || 'bar-tier-5';
}

function getTierLabel(tier) {
  const map = { 1:'🔴 第一梯队', 2:'🔵 第二梯队', 3:'🟢 第三梯队', 4:'⚽ 黑马梯队', 5:'🌍 其他球队' };
  return map[tier] || '';
}

function getRankClass(index) {
  if (index < 3) return 'top3';
  if (index < 10) return 'top10';
  return '';
}

function getChangeHtml(change) {
  if (change === undefined || change === null || change === 0) {
    return '<span class="odds-change flat">—</span>';
  }
  if (change > 0) {
    return '<span class="odds-change up">📈 +' + Math.abs(change).toFixed(1) + '%</span>';
  } else {
    return '<span class="odds-change down">📉 ' + change.toFixed(1) + '%</span>';
  }
}

// ============ 渲染列表 ============
function renderTeams(filteredTeams) {
  const list = document.getElementById('teamList');
  const noResult = document.getElementById('noResult');

  if (filteredTeams.length === 0) {
    list.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }

  noResult.style.display = 'none';

  list.innerHTML = filteredTeams.map((t, i) => {
    const prob = t.probability.toFixed(2);
    const barWidth = (t.probability / maxProb * 100);
    const tierClass = getTierClass(t.tier);
    const rankClass = getRankClass(i);
    const oddsDisplay = Number.isInteger(t.odds) ? t.odds.toLocaleString() : t.odds.toFixed(2);

    return `
      <div class="team-card" data-name="${t.name.toLowerCase()}" data-tier="${t.tier}">
        <div class="top-row">
          <span class="rank ${rankClass}">${i + 1}</span>
          <span class="flag">${t.flag}</span>
          <span class="name">${t.name}</span>
          <span class="prob">${prob}%</span>
          ${getChangeHtml(t.change)}
          <span class="odds-label">赔率${oddsDisplay}</span>
        </div>
        <div class="bar-wrap">
          <div class="bar-fill ${tierClass}" style="width:${barWidth}%"></div>
        </div>
        <div class="bottom-info">
          <span>${getTierLabel(t.tier)}</span>
          <span>赔率 ${oddsDisplay}</span>
        </div>
      </div>
    `;
  }).join('');

  // 动画：延迟后填充进度条
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach((bar, i) => {
        setTimeout(() => {
          const target = bar.style.width;
          bar.style.width = '0%';
          requestAnimationFrame(() => {
            bar.style.width = target;
          });
        }, i * 30);
      });
    });
  });
}

// ============ 筛选逻辑 ============
let currentTier = 'all';
let searchQuery = '';

function applyFilters() {
  let filtered = [...teams];

  if (currentTier !== 'all') {
    filtered = filtered.filter(t => t.tier === parseInt(currentTier));
  }

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase().trim();
    filtered = filtered.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.flag.includes(q)
    );
  }

  renderTeams(filtered);
}

// ============ 事件绑定 ============
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.classList.toggle('visible', searchQuery.length > 0);
  applyFilters();
});

document.getElementById('clearBtn').addEventListener('click', function() {
  const input = document.getElementById('searchInput');
  input.value = '';
  searchQuery = '';
  this.classList.remove('visible');
  applyFilters();
  input.focus();
});

document.getElementById('tierTags').addEventListener('click', function(e) {
  const tag = e.target.closest('.tier-tag');
  if (!tag) return;

  currentTier = tag.dataset.tier;

  document.querySelectorAll('.tier-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');

  applyFilters();
});

// ============ 初始渲染 ============
renderTeams(teams);
</script>

</body>
</html>
