<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2026美加墨世界杯 · 预测中心</title>
<style>
  :root {
    --bg: #0c1628;
    --card: #131e36;
    --card-hover: #1a2a4a;
    --accent: #E61D25;
    --accent2: #3CAC3B;
    --accent3: #2A398D;
    --text: #f0f2f5;
    --text-dim: #8899b0;
    --bar-gold: linear-gradient(90deg, #E61D25, #ff4d55);
    --bar-silver: linear-gradient(90deg, #2A398D, #4a60c8);
    --bar-bronze: linear-gradient(90deg, #3CAC3B, #60d060);
    --bar-elite: linear-gradient(90deg, #E61D25, #2A398D);
    --bar-mid: linear-gradient(90deg, #3CAC3B, #2A398D);
    --bar-low: linear-gradient(90deg, #5a6880, #3a4560);
    --tier1: #E61D25;
    --tier2: #2A398D;
    --tier3: #3CAC3B;
    --tier4: #FFC72C;
    --tier5: #7c8ba0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    overflow-x: hidden;
  }
  .bg-decor { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bg-decor::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 20% 10%, rgba(230,29,37,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 30%, rgba(60,172,59,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 60%, rgba(42,57,141,0.06) 0%, transparent 50%);
  }
  .container { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 22px 16px 40px; }
  .header { text-align: center; padding: 30px 0 22px; }
  .trophy { font-size: 52px; display: block; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  h1 {
    font-size: 30px; font-weight: 850; line-height: 1.2; margin: 12px 0 8px;
    background: linear-gradient(135deg, #E61D25, #2A398D, #3CAC3B);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { color: var(--text-dim); font-size: 14px; line-height: 1.8; }
  .host-tag {
    display: inline-block; margin-left: 6px; padding: 2px 9px; border-radius: 999px;
    font-size: 11px; color: #fff; background: linear-gradient(90deg, #E61D25, #2A398D, #3CAC3B);
  }
  .tricolor-bar { height: 3px; background: linear-gradient(90deg, #E61D25 33%, #2A398D 33% 66%, #3CAC3B 66%); border-radius: 2px; margin: 18px 0 20px; }
  .cards { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .card {
    position: relative; display: block; min-height: 168px; padding: 22px;
    background: linear-gradient(145deg, rgba(19,30,54,0.96), rgba(26,42,74,0.82));
    border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
    color: inherit; text-decoration: none; overflow: hidden; transition: transform .2s, border-color .2s, background .2s;
  }
  .card:hover { transform: translateY(-3px); background: var(--card-hover); border-color: rgba(255,255,255,0.18); }
  .card::after {
    content: ''; position: absolute; right: -32px; top: -32px; width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.10), transparent 62%);
  }
  .card-icon { font-size: 38px; margin-bottom: 14px; }
  .card h2 { font-size: 21px; margin-bottom: 8px; }
  .card p { font-size: 13px; color: var(--text-dim); line-height: 1.7; max-width: 520px; }
  .card .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .pill { font-size: 11px; padding: 5px 9px; border-radius: 999px; background: rgba(255,255,255,0.08); color: var(--text-dim); }
  .primary { border-color: rgba(230,29,37,0.34); }
  .primary .pill.hot { background: rgba(230,29,37,0.18); color: #ff7379; }
  .secondary { border-color: rgba(60,172,59,0.28); }
  .secondary .pill.hot { background: rgba(60,172,59,0.16); color: #72df71; }
  .footer { text-align: center; color: var(--text-dim); font-size: 11px; line-height: 1.8; padding: 24px 0 0; }
  .footer .highlight { color: var(--accent); font-weight: 700; }
  @media (min-width: 720px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 36px; }
  }
</style>
</head>
<body>
<div class="bg-decor"></div>
<main class="container">
  <header class="header">
    <span class="trophy">🏆</span>
    <h1>2026 美加墨世界杯预测中心</h1>
    <div class="subtitle">冠军概率与每日比赛胜负预测统一入口 <span class="host-tag">🇺🇸🇨🇦🇲🇽</span></div>
  </header>

  <div class="tricolor-bar"></div>

  <section class="cards" aria-label="预测页面入口">
    <a class="card primary" href="./champion/">
      <div class="card-icon">🏆</div>
      <h2>冠军预测</h2>
      <p>基于多源冠军赔率均值、FIFA 排名与历史世界杯战绩修正，动态展示 48 支球队的夺冠概率与梯队。</p>
      <div class="meta">
        <span class="pill hot">夺冠概率</span>
        <span class="pill">48 支球队</span>
        <span class="pill">动态梯队</span>
      </div>
    </a>

    <a class="card secondary" href="./daily/">
      <div class="card-icon">⚽</div>
      <h2>每日比赛胜负预测</h2>
      <p>面向当天赛程，输出胜平负概率、推荐结果、关键依据、风险提示与冷门风险，适合每日赛前查看。</p>
      <div class="meta">
        <span class="pill hot">每日赛前</span>
        <span class="pill">胜平负</span>
        <span class="pill">风险提示</span>
      </div>
    </a>
  </section>

  <footer class="footer">
    数据来源以公开可核验信息为准；数据缺失时跳过对应修正，不做编造。<br>
    <span class="highlight">仅供参考，不构成投注建议</span>
  </footer>
</main>
</body>
</html>
